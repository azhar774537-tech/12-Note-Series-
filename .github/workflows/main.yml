name: Build and Deploy Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # We use Node 22 to match the updated environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Fix for Vite base path deployment on GitHub Pages
      - name: Set Vite Base Path
        run: |
          sed -i "s|base: '/'|base: '/12-Note-Series-'|g" vite.config.ts || true

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
