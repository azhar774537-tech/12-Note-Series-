jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. CRITICAL: Add this step first to fetch your source files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java / JDK
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle' # This will now find your gradle-wrapper.properties successfully!

      # 3. Add your remaining build/run steps below...
      
