name: Auto Build React Native App to APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup the correct Java Development Kit (JDK 17 or higher is required for modern Gradle)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 3. Setup and cache Gradle tasks automatically to speed up execution
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. FIX: Grant execute permissions to gradlew wrapper to prevent Exit Code 1 errors
      - name: Grant Execute Permission to Gradlew
        run: chmod +x ./android/gradlew

      # 5. Build the Android Application
      - name: Build Android App (Assemble Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug

      # 6. Upload the built APK file as an artifact so you can download it from GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
