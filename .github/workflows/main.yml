name: Auto Build React Native App to APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the repository files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (Required for React Native)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install React Native project dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Set up Java with the correct working directory path
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
          cache-dependency-path: 'android/build.gradle' # Tells GitHub where to find your gradle files

      # 5. Build the Android APK
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
