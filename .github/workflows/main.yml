name: Auto Build React Native App to APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the repository files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Node.js (Removed 'cache' requirement to bypass the error)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install React Native project dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Set up Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 5. Grant execute permissions for the Gradle wrapper
      - name: Make Gradle executable
        run: chmod +x android/gradlew
        continue-on-error: true

      # 6. Build the Android APK
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
