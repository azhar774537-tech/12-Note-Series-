name: Build and Test Web App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull code files from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js using Version 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install project dependencies
      - name: Install Dependencies
        run: npm install

      # 4. Build the production website files
      - name: Build Web Application
        run: npm run build
